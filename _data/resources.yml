# Curated resources shown on the Resources page.
#
# GitHub-derived fields such as topics, stars, language, release, and update
# date are generated into _data/resources_github.yml by _data/build-resources.rb.
#
# Editorial fields:
# repo: GitHub owner/name. Also the key used to merge generated metadata.
# title: Display name. Defaults to the GitHub repository name when omitted.
# category: High-level grouping on the Resources page.
# ready: Set to false to keep a project out of the public resources page.
# featured: Set to true for the top "Featured" section.
# status: active, maintained, experimental, legacy, archived, etc.
# priority: Lower numbers appear first within a section.
# image: Optional local image.
# description: Human-edited summary. Overrides GitHub description.

